<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pembelian Barang Produksi</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- jsPDF & AutoTable Plugin untuk Tabel di PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    body {
      background: #f0f5ff; /* Biru sangat muda */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card-box {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      border: 1px solid #e0e6ed;
    }

    h2 {
      font-weight: 700;
      color: #0d6efd; /* Biru */
    }

    .table thead {
      background: #0d6efd;
      color: white;
    }

    .btn-custom {
      font-weight: 600;
      padding: 12px;
    }

    /* Tombol Kuning untuk Harian */
    .btn-harian {
      background-color: #ffc107;
      border-color: #ffc107;
      color: #000;
    }
    .btn-harian:hover {
      background-color: #e0a800;
      color: #000;
    }

    /* Tombol Merah untuk Bulanan */
    .btn-bulanan {
      background-color: #dc3545;
      border-color: #dc3545;
      color: #fff;
    }

    .summary-box {
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .label-blue {
      color: #0d6efd;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container py-4">

  <h2 class="text-center mb-4">Aplikasi Pembelian Produksi</h2>

  <!-- FORM INPUT -->
  <div class="card-box mb-4">
    <div class="row g-3">
      <!-- Nama Barang -->
      <div class="col-md-4">
        <label class="form-label fw-bold">Nama Barang</label>
        <input type="text" id="namaBarang" class="form-control" placeholder="Contoh: Tepung Terigu">
      </div>

      <!-- Harga -->
      <div class="col-md-4">
        <label class="form-label fw-bold">Harga Total (Rp)</label>
        <input type="number" id="hargaBarang" class="form-control" placeholder="Masukkan harga">
      </div>

      <!-- Qty -->
      <div class="col-md-2">
        <label class="form-label fw-bold">Qty (Jumlah)</label>
        <input type="number" id="qtyBarang" class="form-control" value="1">
      </div>

      <!-- Gramasi -->
      <div class="col-md-2">
        <label class="form-label fw-bold">Berat/Gramasi</label>
        <div class="input-group">
          <input type="number" id="beratBarang" class="form-control" placeholder="0">
          <select class="form-select" id="satuanBarang">
            <option value="Kg">Kg</option>
            <option value="Gram">Gr</option>
            <option value="Pcs">Pcs</option>
          </select>
        </div>
      </div>

      <div class="col-12 mt-4">
        <button class="btn btn-primary btn-custom w-100" onclick="tambahData()">
          Simpan Data Pembelian
        </button>
      </div>
    </div>
  </div>

  <!-- TABEL DATA -->
  <div class="card-box mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="m-0 label-blue">Riwayat Pembelian</h4>
      <button class="btn btn-sm btn-outline-danger" onclick="hapusSemua()">Hapus Semua Data</button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>No</th>
            <th>Nama Barang</th>
            <th>Qty</th>
            <th>Berat</th>
            <th>Harga</th>
            <th>Tanggal</th>
          </tr>
        </thead>
        <tbody id="tabelData">
        </tbody>
      </table>
    </div>
  </div>

  <!-- REKAP -->
  <div class="row g-4">
    <!-- Rekap Harian -->
    <div class="col-md-6">
      <div class="card-box summary-box">
        <div>
          <h4>Rekap Harian</h4>
          <p class="text-muted">Total pengeluaran hari ini:</p>
          <h3 class="text-primary" id="totalHarian">Rp 0</h3>
        </div>
        <button class="btn btn-harian btn-custom mt-3" onclick="downloadPDF('harian')">
          Download Laporan Harian (PDF)
        </button>
      </div>
    </div>

    <!-- Rekap Bulanan -->
    <div class="col-md-6">
      <div class="card-box summary-box">
        <div>
          <h4>Rekap Bulanan</h4>
          <p class="text-muted">Total pengeluaran bulan ini:</p>
          <h3 class="text-danger" id="totalBulanan">Rp 0</h3>
        </div>
        <button class="btn btn-bulanan btn-custom mt-3" onclick="downloadPDF('bulanan')">
          Download Laporan Bulanan (PDF)
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  // Inisialisasi data dari LocalStorage agar tidak hilang saat reload
  let dataPembelian = JSON.parse(localStorage.getItem("data_pembelian_produksi")) || [];

  // Jalankan saat pertama kali buka
  window.onload = function() {
    renderTable();
    hitungRekap();
  };

  function formatRupiah(angka){
    return "Rp " + parseInt(angka).toLocaleString("id-ID");
  }

  function tambahData(){
    const nama = document.getElementById("namaBarang").value;
    const harga = parseInt(document.getElementById("hargaBarang").value);
    const qty = document.getElementById("qtyBarang").value;
    const berat = document.getElementById("beratBarang").value;
    const satuan = document.getElementById("satuanBarang").value;

    if(nama === "" || isNaN(harga)){
      alert("Nama barang dan harga harus diisi!");
      return;
    }

    const item = {
      id: Date.now(),
      nama,
      harga,
      qty,
      berat: berat ? berat : "-",
      satuan: berat ? satuan : "",
      tanggal: new Date().toISOString() // Simpan sebagai string ISO
    };

    dataPembelian.push(item);
    
    // Simpan ke LocalStorage
    localStorage.setItem("data_pembelian_produksi", JSON.stringify(dataPembelian));

    renderTable();
    hitungRekap();

    // Reset Form
    document.getElementById("namaBarang").value = "";
    document.getElementById("hargaBarang").value = "";
    document.getElementById("beratBarang").value = "";
  }

  function renderTable(){
    const tabel = document.getElementById("tabelData");
    tabel.innerHTML = "";

    // Tampilkan data terbaru di atas
    const dataTerbalik = [...dataPembelian].reverse();

    dataTerbalik.forEach((item, index) => {
      const tgl = new Date(item.tanggal);
      tabel.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${item.nama}</td>
          <td>${item.qty}</td>
          <td>${item.berat} ${item.satuan}</td>
          <td>${formatRupiah(item.harga)}</td>
          <td>${tgl.toLocaleDateString('id-ID')}</td>
        </tr>
      `;
    });
  }

  function hitungRekap(){
    const sekarang = new Date();
    let totalHarian = 0;
    let totalBulanan = 0;

    dataPembelian.forEach(item => {
      const tgl = new Date(item.tanggal);

      // Harian
      if(
        tgl.getDate() === sekarang.getDate() &&
        tgl.getMonth() === sekarang.getMonth() &&
        tgl.getFullYear() === sekarang.getFullYear()
      ){
        totalHarian += item.harga;
      }

      // Bulanan
      if(
        tgl.getMonth() === sekarang.getMonth() &&
        tgl.getFullYear() === sekarang.getFullYear()
      ){
        totalBulanan += item.harga;
      }
    });

    document.getElementById("totalHarian").innerText = formatRupiah(totalHarian);
    document.getElementById("totalBulanan").innerText = formatRupiah(totalBulanan);
  }

  function hapusSemua() {
    if(confirm("Apakah Anda yakin ingin menghapus semua data?")) {
      dataPembelian = [];
      localStorage.removeItem("data_pembelian_produksi");
      renderTable();
      hitungRekap();
    }
  }

  function downloadPDF(jenis){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const sekarang = new Date();

    let title = "";
    let dataFilter = [];

    if(jenis === "harian"){
      title = "LAPORAN HARIAN PEMBELIAN BARANG";
      dataFilter = dataPembelian.filter(item => {
        const tgl = new Date(item.tanggal);
        return tgl.getDate() === sekarang.getDate() &&
               tgl.getMonth() === sekarang.getMonth() &&
               tgl.getFullYear() === sekarang.getFullYear();
      });
    } else {
      title = "LAPORAN BULANAN PEMBELIAN BARANG";
      dataFilter = dataPembelian.filter(item => {
        const tgl = new Date(item.tanggal);
        return tgl.getMonth() === sekarang.getMonth() &&
               tgl.getFullYear() === sekarang.getFullYear();
      });
    }

    // Header PDF
    doc.setFontSize(16);
    doc.text(title, 105, 20, { align: 'center' });
    
    doc.setFontSize(10);
    doc.text("Tanggal Cetak: " + sekarang.toLocaleString('id-ID'), 14, 30);

    // Tabel Rincian Barang
    const tableBody = dataFilter.map((item, index) => [
      index + 1,
      new Date(item.tanggal).toLocaleDateString('id-ID'),
      item.nama,
      item.qty,
      item.berat + " " + item.satuan,
      formatRupiah(item.harga)
    ]);

    doc.autoTable({
      startY: 35,
      head: [['No', 'Tanggal', 'Nama Barang', 'Qty', 'Berat', 'Harga']],
      body: tableBody,
      theme: 'grid',
      headStyles: { fillStyle: [13, 110, 253] } // Biru Bootstrap
    });

    // Total Akhir
    const totalHarga = dataFilter.reduce((sum, item) => sum + item.harga, 0);
    const finalY = doc.lastAutoTable.finalY + 10;
    doc.setFontSize(12);
    doc.setFont("helvetica", "bold");
    doc.text("TOTAL PENGELUARAN: " + formatRupiah(totalHarga), 14, finalY);

    doc.save(`Laporan-${jenis}-${sekarang.toLocaleDateString('id-ID')}.pdf`);
  }
</script>

</body>
</html>
